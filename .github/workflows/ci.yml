name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  # Prevent Next.js from phoning home during CI
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  # -------------------------------------------------------------------------
  # 1. Typecheck — catches TS errors with ignoreBuildErrors: false enforced
  # -------------------------------------------------------------------------
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check
        run: bun run typecheck

  # -------------------------------------------------------------------------
  # 2. Lint — Biome via Ultracite
  # -------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

  # -------------------------------------------------------------------------
  # 3. Unit tests — Vitest
  # -------------------------------------------------------------------------
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        run: bun run test

  # -------------------------------------------------------------------------
  # 4. Build — validates Next.js compilation (with ignoreBuildErrors: false)
  # -------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, lint, test]
    env:
      # Provide placeholder env vars so Next.js doesn't crash at build time
      # when no real Airtable credentials are present.
      AIRTABLE_ACCESS_TOKEN: ${{ secrets.AIRTABLE_ACCESS_TOKEN || 'placeholder' }}
      AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID || 'placeholder' }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
